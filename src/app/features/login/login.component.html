<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 px-4 py-12">
  <div class="w-full max-w-4xl">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
      <div class="bg-gradient-to-r from-blue-600 to-indigo-600 px-8 py-6">
        <h1 class="text-3xl font-bold text-white">Select User</h1>
        <p class="text-blue-100 mt-2">Choose a user to access the portal</p>
      </div>

      <div class="p-8">
        @if (isLoading) {
          <div class="flex items-center justify-center py-12">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
          </div>
        } @else if (errorMessage) {
          <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6">
            <p class="text-red-800">{{ errorMessage }}</p>
          </div>
        } @else {
          <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Search Users
            </label>
            <input
              type="text"
              [formControl]="searchControl"
              placeholder="Search by tenant name or user identifier..."
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
            />
          </div>

          <div class="mb-6 max-h-96 overflow-y-auto border border-gray-200 rounded-lg">
            @if (filteredOptions.length === 0) {
              <div class="p-8 text-center text-gray-500">
                <p>No users found</p>
              </div>
            } @else {
              <div class="divide-y divide-gray-200">
                @for (option of filteredOptions; track option.participantId) {
                  <button
                    type="button"
                    (click)="selectParticipant(option)"
                    [class.bg-blue-50]="selectedParticipant?.participantId === option.participantId"
                    [class.border-blue-500]="selectedParticipant?.participantId === option.participantId"
                    class="w-full px-6 py-4 text-left hover:bg-gray-50 transition border-l-4 border-transparent">
                    <div class="flex items-center justify-between">
                      <div>
                        <p class="font-semibold text-gray-900">{{ option.tenantName }}</p>
                        <p class="text-sm text-gray-600 mt-1">{{ option.participantIdentifier }}</p>
                      </div>
                      @if (selectedParticipant?.participantId === option.participantId) {
                        <svg class="w-6 h-6 text-blue-600" fill="currentColor" viewBox="0 0 20 20">
                          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                        </svg>
                      }
                    </div>
                  </button>
                }
              </div>
            }
          </div>

          <div class="flex gap-4">
            <button
              type="button"
              (click)="cancel()"
              class="flex-1 px-6 py-3 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition font-medium">
              Cancel
            </button>
            <button
              type="button"
              (click)="login()"
              [disabled]="!selectedParticipant"
              [class.opacity-50]="!selectedParticipant"
              [class.cursor-not-allowed]="!selectedParticipant"
              class="flex-1 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium disabled:opacity-50 disabled:cursor-not-allowed">
              Login
            </button>
          </div>
        }
      </div>
    </div>
  </div>
</div>
